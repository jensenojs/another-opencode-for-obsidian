name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.2.6"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Extract version from tag
        id: get_version
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          if [[ "$TAG" != v* ]]; then
            echo "Error: release tag must start with v, got $TAG"
            exit 1
          fi
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Verify release notes exist
        run: |
          NOTES="release-notes/${{ steps.get_version.outputs.tag }}.md"
          if [ ! -f "$NOTES" ]; then
            echo "Error: missing release notes at $NOTES"
            exit 1
          fi
          echo "Release notes: $NOTES"

      - name: Verify manifest version matches tag
        run: |
          MANIFEST_VERSION=$(jq -r '.version' manifest.json)
          TAG_VERSION=${{ steps.get_version.outputs.version }}
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: manifest.json version ($MANIFEST_VERSION) does not match tag version ($TAG_VERSION)"
            exit 1
          fi
          echo "✓ manifest.json version matches tag: $TAG_VERSION"

      - name: Verify versions.json contains tag version
        run: |
          TAG_VERSION=${{ steps.get_version.outputs.version }}
          MIN_APP_VERSION=$(jq -r --arg version "$TAG_VERSION" '.[$version] // empty' versions.json)
          MANIFEST_MIN_APP_VERSION=$(jq -r '.minAppVersion' manifest.json)
          if [ -z "$MIN_APP_VERSION" ]; then
            echo "Error: versions.json does not contain $TAG_VERSION"
            exit 1
          fi
          if [ "$MIN_APP_VERSION" != "$MANIFEST_MIN_APP_VERSION" ]; then
            echo "Error: versions.json maps $TAG_VERSION to $MIN_APP_VERSION, but manifest.json minAppVersion is $MANIFEST_MIN_APP_VERSION"
            exit 1
          fi
          echo "✓ versions.json maps $TAG_VERSION to Obsidian $MIN_APP_VERSION"

      - name: Build plugin
        run: bun run build

      - name: Verify release assets
        run: |
          test -s manifest.json
          test -s main.js
          test -s styles.css
          echo "Release assets ready:"
          ls -lh manifest.json main.js styles.css

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Another OpenCode Plugin for Obsidian ${{ steps.get_version.outputs.tag }}
          body_path: release-notes/${{ steps.get_version.outputs.tag }}.md
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            manifest.json
            main.js
            styles.css
